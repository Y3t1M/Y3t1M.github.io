<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" shape-rendering="crispEdges">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#1a1a2a"/>
  <!-- Sunken screen bevel -->
  <rect x="0" y="0" width="32" height="1" fill="#808080"/>
  <rect x="0" y="0" width="1" height="32" fill="#808080"/>
  <rect x="0" y="31" width="32" height="1" fill="#ffffff"/>
  <rect x="31" y="0" width="1" height="32" fill="#ffffff"/>

  <!-- === BOTTOM ROW: cyan I-piece (4 blocks x=1..28, y=25) === -->
  <rect x="1"  y="25" width="7" height="6" fill="#00c8d8"/><rect x="1"  y="25" width="6" height="1" fill="#80f0ff"/><rect x="1"  y="25" width="1" height="5" fill="#80f0ff"/><rect x="7"  y="25" width="1" height="6" fill="#005060"/><rect x="1"  y="30" width="7" height="1" fill="#005060"/>
  <rect x="8"  y="25" width="7" height="6" fill="#00c8d8"/><rect x="8"  y="25" width="6" height="1" fill="#80f0ff"/><rect x="8"  y="25" width="1" height="5" fill="#80f0ff"/><rect x="14" y="25" width="1" height="6" fill="#005060"/><rect x="8"  y="30" width="7" height="1" fill="#005060"/>
  <rect x="15" y="25" width="7" height="6" fill="#00c8d8"/><rect x="15" y="25" width="6" height="1" fill="#80f0ff"/><rect x="15" y="25" width="1" height="5" fill="#80f0ff"/><rect x="21" y="25" width="1" height="6" fill="#005060"/><rect x="15" y="30" width="7" height="1" fill="#005060"/>
  <rect x="22" y="25" width="7" height="6" fill="#00c8d8"/><rect x="22" y="25" width="6" height="1" fill="#80f0ff"/><rect x="22" y="25" width="1" height="5" fill="#80f0ff"/><rect x="28" y="25" width="1" height="6" fill="#005060"/><rect x="22" y="30" width="7" height="1" fill="#005060"/>
  <!-- === ROW 2: red-orange partial (3 of 4) y=18 === -->
  <rect x="1"  y="18" width="7" height="6" fill="#d03008"/><rect x="1"  y="18" width="6" height="1" fill="#ff8040"/><rect x="1"  y="18" width="1" height="5" fill="#ff8040"/><rect x="7"  y="18" width="1" height="6" fill="#601000"/><rect x="1"  y="23" width="7" height="1" fill="#601000"/>
  <rect x="8"  y="18" width="7" height="6" fill="#d03008"/><rect x="8"  y="18" width="6" height="1" fill="#ff8040"/><rect x="8"  y="18" width="1" height="5" fill="#ff8040"/><rect x="14" y="18" width="1" height="6" fill="#601000"/><rect x="8"  y="23" width="7" height="1" fill="#601000"/>
  <rect x="15" y="18" width="7" height="6" fill="#d03008"/><rect x="15" y="18" width="6" height="1" fill="#ff8040"/><rect x="15" y="18" width="1" height="5" fill="#ff8040"/><rect x="21" y="18" width="1" height="6" fill="#601000"/><rect x="15" y="23" width="7" height="1" fill="#601000"/>
  <!-- === yellow O-piece (2x2) right side, y=4 and y=11 === -->
  <rect x="15" y="4"  width="7" height="6" fill="#d8c000"/><rect x="15" y="4"  width="6" height="1" fill="#ffff60"/><rect x="15" y="4"  width="1" height="5" fill="#ffff60"/><rect x="21" y="4"  width="1" height="6" fill="#807000"/><rect x="15" y="9"  width="7" height="1" fill="#807000"/>
  <rect x="22" y="4"  width="7" height="6" fill="#d8c000"/><rect x="22" y="4"  width="6" height="1" fill="#ffff60"/><rect x="22" y="4"  width="1" height="5" fill="#ffff60"/><rect x="28" y="4"  width="1" height="6" fill="#807000"/><rect x="22" y="9"  width="7" height="1" fill="#807000"/>
  <rect x="15" y="11" width="7" height="6" fill="#d8c000"/><rect x="15" y="11" width="6" height="1" fill="#ffff60"/><rect x="15" y="11" width="1" height="5" fill="#ffff60"/><rect x="21" y="11" width="1" height="6" fill="#807000"/><rect x="15" y="16" width="7" height="1" fill="#807000"/>
  <rect x="22" y="11" width="7" height="6" fill="#d8c000"/><rect x="22" y="11" width="6" height="1" fill="#ffff60"/><rect x="22" y="11" width="1" height="5" fill="#ffff60"/><rect x="28" y="11" width="1" height="6" fill="#807000"/><rect x="22" y="16" width="7" height="1" fill="#807000"/>
  <!-- === purple T-piece (falling): 3-wide top + 1 stem, left side === -->
  <!-- T-top: x=1 and x=8, y=4 -->
  <rect x="1"  y="4"  width="7" height="6" fill="#8818b8"/><rect x="1"  y="4"  width="6" height="1" fill="#d060ff"/><rect x="1"  y="4"  width="1" height="5" fill="#d060ff"/><rect x="7"  y="4"  width="1" height="6" fill="#380860"/><rect x="1"  y="9"  width="7" height="1" fill="#380860"/>
  <rect x="8"  y="4"  width="7" height="6" fill="#8818b8"/><rect x="8"  y="4"  width="6" height="1" fill="#d060ff"/><rect x="8"  y="4"  width="1" height="5" fill="#d060ff"/><rect x="14" y="4"  width="1" height="6" fill="#380860"/><rect x="8"  y="9"  width="7" height="1" fill="#380860"/>
  <!-- T-stem: center x=8, y=11 -->
  <rect x="8"  y="11" width="7" height="6" fill="#8818b8"/><rect x="8"  y="11" width="6" height="1" fill="#d060ff"/><rect x="8"  y="11" width="1" height="5" fill="#d060ff"/><rect x="14" y="11" width="1" height="6" fill="#380860"/><rect x="8"  y="16" width="7" height="1" fill="#380860"/>
</svg>
