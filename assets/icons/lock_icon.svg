<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" shape-rendering="crispEdges">
  <!-- Shackle (U arch) -->
  <rect x="8"  y="2"  width="8"  height="1"  fill="#808080"/>
  <rect x="7"  y="3"  width="1"  height="1"  fill="#808080"/>
  <rect x="15" y="3"  width="1"  height="1"  fill="#808080"/>
  <rect x="6"  y="4"  width="1"  height="5"  fill="#808080"/>
  <rect x="17" y="4"  width="1"  height="5"  fill="#808080"/>
  <rect x="7"  y="4"  width="1"  height="5"  fill="#c0c0c0"/>
  <rect x="15" y="4"  width="1"  height="5"  fill="#c0c0c0"/>
  <rect x="8"  y="3"  width="8"  height="1"  fill="#c0c0c0"/>
  <rect x="8"  y="4"  width="1"  height="4"  fill="#c0c0c0"/>
  <rect x="15" y="4"  width="1"  height="4"  fill="#808080"/>
  <!-- Body (locked box) -->
  <rect x="4"  y="9"  width="16" height="12" fill="#c0c0c0"/>
  <!-- Body raised bevel -->
  <rect x="4"  y="9"  width="16" height="1"  fill="#ffffff"/>
  <rect x="4"  y="9"  width="1"  height="12" fill="#ffffff"/>
  <rect x="4"  y="20" width="16" height="1"  fill="#808080"/>
  <rect x="19" y="9"  width="1"  height="12" fill="#808080"/>
  <!-- Keyhole circle (sunken) -->
  <rect x="10" y="12" width="4"  height="1"  fill="#404040"/>
  <rect x="9"  y="13" width="6"  height="1"  fill="#404040"/>
  <rect x="9"  y="14" width="6"  height="1"  fill="#404040"/>
  <rect x="10" y="15" width="4"  height="1"  fill="#404040"/>
  <!-- Keyhole stem -->
  <rect x="11" y="15" width="2"  height="3"  fill="#404040"/>
</svg>