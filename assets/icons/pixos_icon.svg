<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" shape-rendering="crispEdges">
  <!-- W95 gray background -->
  <rect width="32" height="32" fill="#c0c0c0"/>
  <!-- Raised outer bevel -->
  <rect x="0" y="0" width="32" height="1" fill="#ffffff"/>
  <rect x="0" y="0" width="1" height="32" fill="#ffffff"/>
  <rect x="0" y="31" width="32" height="1" fill="#808080"/>
  <rect x="31" y="0" width="1" height="32" fill="#808080"/>

  <!-- Canvas (sunken inset) -->
  <rect x="3" y="3" width="19" height="19" fill="#ffffff"/>
  <rect x="2" y="2" width="20" height="1" fill="#808080"/>
  <rect x="2" y="2" width="1" height="20" fill="#808080"/>
  <rect x="2" y="21" width="21" height="1" fill="#ffffff"/>
  <rect x="22" y="2" width="1" height="20" fill="#ffffff"/>

  <!-- Pixel art on canvas: colorful 4x4 pixel blocks -->
  <rect x="3"  y="3"  width="4" height="4" fill="#e80000"/>
  <rect x="7"  y="3"  width="4" height="4" fill="#ff8800"/>
  <rect x="11" y="3"  width="4" height="4" fill="#d8c000"/>
  <rect x="15" y="3"  width="4" height="4" fill="#00a000"/>
  <rect x="3"  y="7"  width="4" height="4" fill="#0050d8"/>
  <rect x="7"  y="7"  width="4" height="4" fill="#8800b0"/>
  <rect x="11" y="7"  width="4" height="4" fill="#00a8a8"/>
  <rect x="15" y="7"  width="4" height="4" fill="#ffffff"/>
  <rect x="3"  y="11" width="4" height="4" fill="#d8c000"/>
  <rect x="7"  y="11" width="4" height="4" fill="#e80000"/>
  <rect x="11" y="11" width="4" height="4" fill="#0050d8"/>
  <rect x="15" y="11" width="4" height="4" fill="#ff8800"/>
  <rect x="3"  y="15" width="4" height="4" fill="#8800b0"/>
  <rect x="7"  y="15" width="4" height="4" fill="#00a000"/>
  <rect x="11" y="15" width="4" height="4" fill="#e80000"/>
  <rect x="15" y="15" width="4" height="4" fill="#d8c000"/>

  <!-- Paintbrush to the right of canvas -->
  <!-- Handle (brown) stacked diagonal -->
  <rect x="26" y="2"  width="3" height="4" fill="#a05820"/>
  <rect x="25" y="6"  width="3" height="4" fill="#a05820"/>
  <rect x="24" y="10" width="3" height="3" fill="#a05820"/>
  <!-- Ferrule (silver) -->
  <rect x="24" y="13" width="3" height="1" fill="#ffffff"/>
  <rect x="24" y="14" width="3" height="1" fill="#808080"/>
  <!-- Bristles (tapered) -->
  <rect x="24" y="15" width="3" height="3" fill="#282828"/>
  <rect x="24" y="18" width="2" height="2" fill="#282828"/>
  <rect x="24" y="20" width="1" height="2" fill="#181818"/>

  <!-- Color palette strip at bottom -->
  <rect x="2"  y="23" width="28" height="1" fill="#808080"/>
  <rect x="2"  y="24" width="4" height="5" fill="#000000"/>
  <rect x="6"  y="24" width="4" height="5" fill="#808080"/>
  <rect x="10" y="24" width="4" height="5" fill="#e80000"/>
  <rect x="14" y="24" width="4" height="5" fill="#00a000"/>
  <rect x="18" y="24" width="4" height="5" fill="#0040d0"/>
  <rect x="22" y="24" width="4" height="5" fill="#d8c000"/>
  <rect x="26" y="24" width="4" height="5" fill="#ff8800"/>
  <rect x="2"  y="29" width="28" height="1" fill="#ffffff"/>
</svg>
