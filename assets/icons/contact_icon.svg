<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" shape-rendering="crispEdges">
  <!-- Envelope body -->
  <rect x="1"  y="5"  width="22" height="14" fill="#e8e8e8"/>
  <!-- W95 raised bevel on body -->
  <rect x="1"  y="5"  width="22" height="1"  fill="#ffffff"/>
  <rect x="1"  y="5"  width="1"  height="14" fill="#ffffff"/>
  <rect x="1"  y="18" width="22" height="1"  fill="#808080"/>
  <rect x="22" y="5"  width="1"  height="14" fill="#808080"/>
  <!-- Envelope flap V (pixel diagonal rows, top half) -->
  <rect x="1"  y="5"  width="4"  height="1"  fill="#000080"/>
  <rect x="2"  y="6"  width="2"  height="1"  fill="#000080"/>
  <rect x="4"  y="6"  width="2"  height="1"  fill="#000080"/>
  <rect x="5"  y="7"  width="2"  height="1"  fill="#000080"/>
  <rect x="7"  y="7"  width="2"  height="1"  fill="#000080"/>
  <rect x="8"  y="8"  width="2"  height="1"  fill="#000080"/>
  <rect x="10" y="8"  width="4"  height="1"  fill="#000080"/>
  <rect x="13" y="8"  width="2"  height="1"  fill="#000080"/>
  <rect x="14" y="7"  width="2"  height="1"  fill="#000080"/>
  <rect x="16" y="7"  width="2"  height="1"  fill="#000080"/>
  <rect x="17" y="6"  width="2"  height="1"  fill="#000080"/>
  <rect x="19" y="6"  width="2"  height="1"  fill="#000080"/>
  <rect x="20" y="5"  width="3"  height="1"  fill="#000080"/>
  <!-- Bottom-left and bottom-right diagonals (fold lines) -->
  <rect x="1"  y="14" width="1"  height="1"  fill="#808080"/>
  <rect x="2"  y="15" width="1"  height="1"  fill="#808080"/>
  <rect x="3"  y="16" width="1"  height="1"  fill="#808080"/>
  <rect x="4"  y="17" width="1"  height="1"  fill="#808080"/>
  <rect x="21" y="14" width="1"  height="1"  fill="#808080"/>
  <rect x="20" y="15" width="1"  height="1"  fill="#808080"/>
  <rect x="19" y="16" width="1"  height="1"  fill="#808080"/>
  <rect x="18" y="17" width="1"  height="1"  fill="#808080"/>
</svg>